name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: guidehub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # ── Server ──
      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Generate Prisma client
        working-directory: ./server
        run: npx prisma generate

      - name: Run Prisma migrations
        working-directory: ./server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/guidehub_test?schema=public
        run: npx prisma migrate deploy

      - name: Build server
        working-directory: ./server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/guidehub_test?schema=public
        run: npm run build

      # ── Frontend ──
      - name: Install frontend dependencies
        working-directory: ./guidehub
        run: npm ci

      - name: Build frontend
        working-directory: ./guidehub
        run: npm run build

      - name: Type check frontend
        working-directory: ./guidehub
        run: npx tsc --noEmit
