services:
  postgres:
    image: postgres:17-alpine
    container_name: guidehub-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: guidehub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d guidehub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guidehub-network
    restart: always

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: guidehub-server
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/guidehub?schema=public
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - guidehub-network
    restart: always

  guidehub:
    build:
      context: ./guidehub
      dockerfile: Dockerfile.prod
    container_name: guidehub-frontend
    depends_on:
      - server
    networks:
      - guidehub-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: guidehub-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
      - guidehub
    networks:
      - guidehub-network
    restart: always

volumes:
  postgres_data:

networks:
  guidehub-network:
    driver: bridge
